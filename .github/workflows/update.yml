name: MuleSoft Docs Update

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-docs:
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.fetch.outputs.success }}
      fail: ${{ steps.fetch.outputs.fail }}
      count: ${{ steps.fetch.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and reorganize MuleSoft docs
        id: fetch
        shell: bash
        run: |
          set -e

          curl -sL -o llms_raw.txt "https://docs.mulesoft.com/llms.txt"

          PRODUCTS=$(grep -oP 'https://docs\.mulesoft\.com/\K[^/]+(?=/llms\.txt)' llms_raw.txt | sort -u)

          {
            echo "# MuleSoft Documentation"
            echo ""
            echo "> Mirrored from https://docs.mulesoft.com/llms.txt - Updated $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "> LLM-friendly index of all MuleSoft product documentation."
            echo ""
            echo "## Guides"
            echo ""
          } > llms.txt

          COUNT=0
          SUCCESS=0
          FAIL=0

          for SLUG in $PRODUCTS; do
            COUNT=$((COUNT + 1))
            DESC=$(grep -oP "(?<=$SLUG/llms\.txt\): )[^)]*" llms_raw.txt | head -1)

            mkdir -p "products/$SLUG"

            HTTP_CODE=$(curl -sL -o "products/$SLUG/llms-full.txt" -w "%{http_code}" "https://docs.mulesoft.com/$SLUG/llms-full.txt" --max-time 30)

            if [ "$HTTP_CODE" = "200" ] && [ -s "products/$SLUG/llms-full.txt" ] && ! grep -qi "page not found" "products/$SLUG/llms-full.txt" 2>/dev/null; then
              SUCCESS=$((SUCCESS + 1))
              echo "[$COUNT] OK $SLUG"
            else
              rm -f "products/$SLUG/llms-full.txt"
              rmdir "products/$SLUG" 2>/dev/null || true
              FAIL=$((FAIL + 1))
              echo "[$COUNT] FAIL $SLUG (HTTP $HTTP_CODE)"
            fi

            # Also download product llms.txt
            curl -sL -o "products/$SLUG/llms.txt" "https://docs.mulesoft.com/$SLUG/llms.txt" --max-time 15

            echo "- [$SLUG](products/$SLUG/llms.txt): $DESC" >> llms.txt
          done

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "" >> llms.txt
          echo "Success: $SUCCESS | Failed: $FAIL | Total: $COUNT" >> llms.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: fetch-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
